<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Argie Coffee - Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{ background:#f4f6f8; color:#1f2937; min-height:100vh; }
header{ background:#fff; padding:18px 24px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 10px rgba(0,0,0,.05); position:sticky; top:0; z-index:100; }
header h1{ font-size:20px; color:#0f172a; }
header a{ text-decoration:none; color:#006241; font-weight:600; }
.container{ max-width:1180px; margin:24px auto; padding:0 24px; }
.panel{ background:#fff; border-radius:18px; padding:24px; box-shadow:0 10px 40px rgba(15,23,42,.05); }
.subtitle{ color:#64748b; margin-top:8px; }
.stats{ display:grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap:16px; margin:16px 0 24px; }
.stat-card{ background:#f8fafc; border-radius:14px; padding:18px; display:flex; flex-direction:column; gap:8px; }
.stat-card span{ font-size:12px; color:#475569; text-transform:uppercase; letter-spacing:.05em; }
.stat-card p{ font-size:26px; font-weight:700; color:#0f172a; }
.order-list{ display:grid; gap:16px; }
.order-card{ background:#fff; border:1px solid #e2e8f0; border-radius:14px; padding:18px; }
.order-header{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px; }
.order-code{ font-size:14px; font-weight:700; color:#006241; }
.badge{ padding:4px 10px; border-radius:999px; font-size:11px; font-weight:700; text-transform:uppercase; }
.badge-Pending{ background:#fff9e6; color:#b48400; }
.badge-Confirmed{ background:#e6f3ed; color:#0f766e; }
.badge-Rejected{ background:#fee2e2; color:#991b1b; }
.order-details p{ margin:4px 0; font-size:13px; color:#475569; }
.order-items{ margin:12px 0; font-size:12px; background:#f8fafc; border-radius:10px; padding:12px; color:#334155; }
.order-actions{ display:flex; flex-wrap:wrap; gap:10px; }
.admin-btn{ border:none; border-radius:10px; padding:10px 14px; font-size:12px; font-weight:700; cursor:pointer; }
.btn-approve{ background:#e6f3ed; color:#0f766e; }
.btn-deny{ background:#fee2e2; color:#991b1b; }
.btn-clear{ background:#f8fafc; color:#334155; }
.empty-state{ text-align:center; padding:32px 0; color:#64748b; font-size:14px; }
</style>
</head>
<body>
<header>
    <div>
        <h1>Argie Coffee Admin</h1>
        <div class="subtitle">Review and manage customer orders</div>
    </div>
    <a href="menu.html">Customer Menu</a>
</header>
<div class="container">
    <div class="panel">
        <div class="stats">
            <div class="stat-card">
                <span>Pending Orders</span>
                <p id="pendingCount">0</p>
            </div>
            <div class="stat-card">
                <span>Approved Orders</span>
                <p id="approvedCount">0</p>
            </div>
            <div class="stat-card">
                <span>Rejected Orders</span>
                <p id="rejectedCount">0</p>
            </div>
        </div>
        <div class="order-list" id="orderList"></div>
        <div class="empty-state" id="emptyState">No orders have been placed yet. Visit the customer menu to create an order.</div>
    </div>
</div>
<script>
const ORDER_STORAGE_KEY = 'coffee_admin_orders';

function loadOrders() {
    const stored = localStorage.getItem(ORDER_STORAGE_KEY);
    return stored ? JSON.parse(stored) : [];
}

function saveOrders(orders) {
    localStorage.setItem(ORDER_STORAGE_KEY, JSON.stringify(orders));
}

function renderOrders() {
    const orders = loadOrders();
    const list = document.getElementById('orderList');
    const emptyState = document.getElementById('emptyState');
    let pending = 0, approved = 0, rejected = 0;

    list.innerHTML = '';
    if (!orders.length) {
        emptyState.style.display = 'block';
    } else {
        emptyState.style.display = 'none';
        orders.forEach((order, index) => {
            if (order.status === 'Pending') pending++;
            if (order.status === 'Confirmed') approved++;
            if (order.status === 'Rejected') rejected++;

            const card = document.createElement('div');
            card.className = 'order-card';
            card.innerHTML = `
                <div class="order-header">
                    <div class="order-code">${order.code}</div>
                    <div class="badge badge-${order.status}">${order.status}</div>
                </div>
                <div class="order-details">
                    <p><strong>Customer:</strong> ${order.customer}</p>
                    <p><strong>Phone:</strong> ${order.phone}</p>
                    <p><strong>Service:</strong> ${order.type}</p>
                    <p class="order-items"><strong>Items:</strong> ${order.items.map(i => `${i.name} x${i.qty}`).join(', ')}</p>
                    <p><strong>Total:</strong> ₱${order.total}</p>
                </div>
                ${order.status === 'Pending' ? `
                    <div class="order-actions">
                        <button class="admin-btn btn-approve" onclick="updateStatus(${index}, 'Confirmed')">Accept</button>
                        <button class="admin-btn btn-deny" onclick="updateStatus(${index}, 'Rejected')">Reject</button>
                    </div>
                ` : ''}
            `;
            list.appendChild(card);
        });
    }
    document.getElementById('pendingCount').textContent = pending;
    document.getElementById('approvedCount').textContent = approved;
    document.getElementById('rejectedCount').textContent = rejected;
}

function updateStatus(index, status) {
    const orders = loadOrders();
    if (orders[index]) {
        orders[index].status = status;
        saveOrders(orders);
        renderOrders();
    }
}

renderOrders();
</script>
</body>
</html>
